<canvas id="bg"></canvas>

<!-- PARTICLES CANVAS -->
<canvas id="particles"></canvas>

<!-- UI -->

position:fixed;
inset:0;

">

<script>
/* ================= STRIPES BACKGROUND ================= */

const bg = document.getElementById("bg");
const btx = bg.getContext("2d");

let w = window.innerWidth;
let h = window.innerHeight;

bg.width = w;
bg.height = h;

window.onresize = () => {
    w = bg.width = window.innerWidth;
    h = bg.height = window.innerHeight;
};

let offset = 0;

function drawStripes(){

    btx.clearRect(0,0,w,h);

    // dark base
    btx.fillStyle = "#050505";
    btx.fillRect(0,0,w,h);

    offset += 0.4;

    let spacing = 45;

    for(let i=-w; i<w; i+=spacing){

        let x = i + (offset % spacing);

        btx.strokeStyle = "rgba(255,255,255,0.06)";
        btx.lineWidth = 2;

        btx.beginPath();
        btx.moveTo(x,0);
        btx.lineTo(x+300,h);
        btx.stroke();
    }

    requestAnimationFrame(drawStripes);
}

drawStripes();


/* ================= PARTICLES ================= */

const pc = document.getElementById("particles");
const ctx = pc.getContext("2d");

pc.width = w;
pc.height = h;

window.onresize = () => {
    pc.width = window.innerWidth;
    pc.height = window.innerHeight;
};

let mouse = {x:null,y:null};

window.onmousemove = e=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
};

let particles = [];

for(let i=0;i<180;i++){
    particles.push({
        x:Math.random()*w,
        y:Math.random()*h,
        vx:(Math.random()-0.5)*0.6,
        vy:(Math.random()-0.5)*0.6,
        r:0.8 + Math.random()*1.2
    });
}

function animate(){

    ctx.clearRect(0,0,w,h);

    for(let p of particles){

        let dx = p.x - mouse.x;
        let dy = p.y - mouse.y;
        let dist = Math.sqrt(dx*dx+dy*dy);

        if(dist < 140){
            p.x += dx / dist * 2.5;
            p.y += dy / dist * 2.5;
        }

        p.x += p.vx;
        p.y += p.vy;

        if(p.x<0) p.x=w;
        if(p.x>w) p.x=0;
        if(p.y<0) p.y=h;
        if(p.y>h) p.y=0;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.shadowBlur = 12;
        ctx.shadowColor = "white";
        ctx.fill();

        ctx.shadowBlur = 0;
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
