<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Strike</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    height:100%;
    font-family:Arial, Helvetica, sans-serif;
    background:#060606;
    color:white;
    text-align:center;
}

/* STRIPES (VERY VISIBLE VERSION) */
body{
    position:relative;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;

    background:
    repeating-linear-gradient(
        135deg,
        rgba(255,255,255,0.08) 0px,
        rgba(255,255,255,0.08) 2px,
        transparent 2px,
        transparent 20px
    );

    z-index:0;
}

/* GLOW */
body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;

    background:
    radial-gradient(circle at top, rgba(255,255,255,0.12), transparent 55%),
    radial-gradient(circle at bottom, rgba(255,255,255,0.06), transparent 60%);

    z-index:0;
}

/* CONTENT */
.container{
    position:relative;
    z-index:1;
    max-width:900px;
    margin:auto;
    padding:90px 20px;
}

h1{
    font-size:78px;
    font-weight:900;
    letter-spacing:6px;

    text-shadow:
        0 0 15px rgba(255,255,255,0.25),
        0 0 50px rgba(255,255,255,0.12);
}

.subtitle{
    font-size:20px;
    margin-top:10px;
    color:#cfcfcf;
}

.beta-btn{
    display:inline-block;
    margin-top:35px;
    padding:16px 40px;

    background:white;
    color:black;
    font-weight:800;
    font-size:18px;

    border-radius:14px;
    text-decoration:none;

    box-shadow:0 0 30px rgba(255,255,255,0.25);

    transition:0.25s;
}

.beta-btn:hover{
    transform:scale(1.06);
    box-shadow:0 0 60px rgba(255,255,255,0.45);
}

h2{
    margin-top:70px;
    font-size:30px;
}

ul{
    list-style:none;
    margin-top:20px;
}

li{
    font-size:18px;
    margin:10px 0;
    color:#dcdcdc;
}

.about{
    margin-top:20px;
    font-size:17px;
    line-height:1.6;
    color:#cfcfcf;
}

hr{
    border:none;
    height:1px;
    width:70%;
    margin:60px auto;
    background:rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="container">

<h1>SHADOW STRIKE</h1>

<p class="subtitle">Upcoming Roblox Game</p>

<a class="beta-btn"
href="https://www.roblox.com/share?code=1c9d13905ba0eb44952a8a942150a77a&type=ExperienceDetails&stamp=1783168145138"
target="_blank">
Beta is Out
</a>

<hr>

<h2>Genre</h2>
<ul>
<li>FPS</li>
<li>Modern</li>
<li>Shooter</li>
</ul>

<hr>

<h2>About</h2>
<p class="about">
Shadow Strike is a new Roblox project currently under development.
</p>

<hr>

<h2>Coming Soon</h2>
<ul>
<li>Tags</li>
<li>Groups</li>
<li>Live Chat</li>
<li>Mobile App</li>
</ul>

</div>

</body>
</html>
