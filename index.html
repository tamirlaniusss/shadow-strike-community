<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Strike</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">Shadow Strike</div>
  <button onclick="toggleTheme()">🌙 / ☀️</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>SHADOW STRIKE</h1>
</div>

<!-- MAIN CONTAINER -->
<div class="container">

  <!-- INPUT BOX -->
  <div class="ask-box">
    <h2>Ask a Question</h2>

    <input 
      id="questionInput" 
      type="text" 
      placeholder="Type your question here..."
    >

    <button onclick="addQuestion()">Post Question</button>
  </div>

  <!-- POSTS GO HERE -->
  <div id="questionsList"></div>

</div>

<!-- JS MUST BE LAST -->
<script src="app.js"></script>

</body>
</html>
