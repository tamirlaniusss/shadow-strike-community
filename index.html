<head>
<meta charset="UTF-8">

<title>Shadow Strike</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050505;
    color:white;
    overflow-x:hidden;
    overflow-y:auto;
    filter: contrast(1.15) brightness(1.2);

/* soft glow fog */
html::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:radial-gradient(circle at center,
    rgba(255,255,255,0.06),
    rgba(0,0,0,0.85));
    z-index:2;
}

/* CANVAS FULLSCREEN */
canvas{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    display:block;
}

#bg{ z-index:0; }
#particles{ z-index:1; }

/* UI */
.container{
    position:relative;
    z-index:5;
    text-align:center;
    padding:110px 20px 60px;
}

.top{
    position:fixed;
    top:0;
    width:100%;
    padding:12px;
    text-align:center;

    background:rgba(0,0,0,0.6);
    border-bottom:1px solid rgba(255,255,255,0.1);

    font-weight:900;
    letter-spacing:6px;
    z-index:999;

    text-shadow:
    0 0 10px rgba(255,255,255,0.8),
    0 0 30px rgba(255,255,255,0.5),
    0 0 60px rgba(255,255,255,0.3);
}

/* TITLE */
h1{
    font-size:70px;
    text-shadow:0 0 15px rgba(255,255,255,0.8);
}

/* BUTTONS */
.button{
    display:inline-block;
    margin:10px;
    padding:12px 25px;

    background:#5865F2;
    color:white;

/* SCREENSHOTS */

    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

.gallery img{
    width:300px;
    border-radius:18px;

/* DEV BUTTONS */

    border-radius:10px;
    color:white;

    background:rgba(255,255,255,0.08);

.dev:hover{
    background:rgba(255,255,255,0.18);
    transform:scale(1.08);

<script>

/* STRIPES */
const bg = document.getElementById("bg");
const btx = bg.getContext("2d");

function resize(){
    bg.width = window.innerWidth;
    bg.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let offset = 0;

function draw(){
    btx.clearRect(0,0,bg.width,bg.height);
    btx.fillStyle="#050505";
    btx.fillRect(0,0,bg.width,bg.height);

    offset += 0.4;

    for(let i=-bg.width;i<bg.width;i+=45){
        let x = i + (offset % 45);

        btx.strokeStyle="rgba(255,255,255,0.06)";
        btx.beginPath();
        btx.moveTo(x,0);
        btx.lineTo(x+300,bg.height);
        btx.stroke();
    }

    requestAnimationFrame(draw);
}
draw();

/* PARTICLES */
const pc = document.getElementById("particles");
const ctx = pc.getContext("2d");

function resizeP(){
    pc.width = window.innerWidth;
    pc.height = window.innerHeight;
}
resizeP();
window.addEventListener("resize", resizeP);

let mouse = {x:0,y:0};

window.onmousemove = e=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
};

let particles = [];

for(let i=0;i<180;i++){
    particles.push({
        x:Math.random()*window.innerWidth,
        y:Math.random()*window.innerHeight,
        vx:(Math.random()-0.5)*0.6,
        vy:(Math.random()-0.5)*0.6,
        r:1.3
    });
}

function animate(){
    ctx.clearRect(0,0,pc.width,pc.height);

    for(let p of particles){

        let dx = p.x - mouse.x;
        let dy = p.y - mouse.y;
        let dist = Math.sqrt(dx*dx+dy*dy);

        if(dist < 150){
            p.x += dx/dist * 2.5;
            p.y += dy/dist * 2.5;
        }

        p.x += p.vx;
        p.y += p.vy;

        if(p.x<0)p.x=pc.width;
        if(p.x>pc.width)p.x=0;
        if(p.y<0)p.y=pc.height;
        if(p.y>pc.height)p.y=0;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
    }

    requestAnimationFrame(animate);
}
animate();

</script>

</body>
