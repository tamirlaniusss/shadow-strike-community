<html lang="en">

<title>Shadow Strike</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#050505;
    color:white;
    text-align:center;
    overflow:hidden;
    position:relative;
}

/* ================= BIGGER STRIPES ================= */

body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;

    background:
    repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.06) 0px,
        rgba(255,255,255,0.06) 2px,
        transparent 2px,
        transparent 40px
    );
}

/* glow fog */
body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;

    background:
    radial-gradient(circle at 50% 10%, rgba(255,255,255,0.12), transparent 55%),
    radial-gradient(circle at 50% 90%, rgba(255,255,255,0.06), transparent 60%);
}

/* ================= PARTICLES CANVAS ================= */

#particles{
    position:fixed;
    inset:0;
    z-index:0;
}

/* content above particles */
.container, .top-banner{
    position:relative;
    z-index:2;
}

/* ================= FADE ================= */

.fade{
    opacity:0;
    transform:translateY(20px);
    animation:fadeIn 0.9s ease forwards;
}

.delay1{animation-delay:0.1s;}
.delay2{animation-delay:0.2s;}
.delay3{animation-delay:0.3s;}
.delay4{animation-delay:0.4s;}
.delay5{animation-delay:0.5s;}

@keyframes fadeIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ================= TOP ================= */

.top-banner{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:12px 0;
    background:rgba(0,0,0,0.6);
    border-bottom:1px solid rgba(255,255,255,0.1);
    font-weight:900;
    letter-spacing:6px;
    text-shadow:0 0 15px rgba(255,255,255,0.4);
}

/* ================= LAYOUT ================= */

.container{
    padding:120px 20px 60px;
    max-width:900px;
    margin:auto;
}

/* TITLE */

h1{
    font-size:70px;
    letter-spacing:6px;
    text-shadow:
        0 0 10px rgba(255,255,255,0.6),
        0 0 25px rgba(255,255,255,0.4),
        0 0 60px rgba(255,255,255,0.2);
}

/* BUTTONS */

.button{
    display:inline-block;
    margin:20px 10px;
    padding:14px 30px;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.beta{
    background:white;
    color:black;
    box-shadow:0 0 25px rgba(255,255,255,0.4);
}

.discord{
    background:#5865F2;
    color:white;
    box-shadow:0 0 25px rgba(88,101,242,0.4);
}

.button:hover{
    transform:scale(1.08);
}

/* SCREENSHOTS */

.gallery{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin-top:20px;
}

.gallery img{
    width:320px;
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,0.7);

/* DEV */

.dev{
    display:inline-block;
    margin:8px;
    padding:8px 14px;
    border-radius:10px;
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.dev:hover{
    background:rgba(255,255,255,0.1);
    transform:scale(1.1);
}
</style>

<script>
/* ================= PARTICLES SYSTEM ================= */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let mouse = {x:null,y:null};
window.addEventListener("mousemove",e=>{
    mouse.x = e.x;
    mouse.y = e.y;
});

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*w,
        y:Math.random()*h,
        vx:(Math.random()-0.5)*1,
        vy:(Math.random()-0.5)*1,
        r:2+Math.random()*2
    });
}

function animate(){
    ctx.clearRect(0,0,w,h);

    for(let p of particles){

        let dx = p.x - mouse.x;
        let dy = p.y - mouse.y;
        let dist = Math.sqrt(dx*dx+dy*dy);

        // repel from mouse
        if(dist < 120){
            p.x += dx / dist * 3;
            p.y += dy / dist * 3;
        }

        p.x += p.vx;
        p.y += p.vy;

        if(p.x < 0) p.x = w;
        if(p.x > w) p.x = 0;
        if(p.y < 0) p.y = h;
        if(p.y > h) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.fill();
    }

    requestAnimationFrame(animate);
}

animate();
</script>
