async function loadMessages() {
  const { data } = await supabase
    .from("messages")
    .select("*")
    .order("id", { ascending: false });

  const list = document.getElementById("questionsList");
  list.innerHTML = "";

    div.className = "question";
    div.innerHTML = "<h3>" + msg.text + "</h3>";
    list.appendChild(div);
  });
}

};
