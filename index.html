<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Strike</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050505;
    color:white;

    /* FIX: allow scrolling */
    overflow-y:auto;
    overflow-x:hidden;

    min-height:100vh;
    animation: breathe 6s ease-in-out infinite;
}

@keyframes breathe{
    0%{ filter: contrast(1.05) brightness(1.02); }
    50%{ filter: contrast(1.2) brightness(1.15); }
    100%{ filter: contrast(1.05) brightness(1.02); }
}

/* =========================
   EXPLOSION (kept, slightly softer)
   ========================= */
.explosion{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9999;
}

.explosion::before{
    content:"";
    position:absolute;
    inset:0;
    background: radial-gradient(circle,
        rgba(255,255,255,0.35),
        rgba(0,0,0,0.95)
    );
    animation: flashIn 0.9s ease-out forwards;
}

.explosion::after{
    content:"";
    position:absolute;
    inset:0;
    border:2px solid rgba(255,255,255,0.35);
    border-radius:50%;
    transform:scale(0.2);
    opacity:1;
    animation: ringIn 0.9s ease-out forwards;
}

@keyframes flashIn{
    0%{opacity:1;transform:scale(0.3);filter:blur(20px);}
    70%{opacity:1;transform:scale(1.05);filter:blur(0px);}
    100%{opacity:1;transform:scale(1);}
}

@keyframes ringIn{
    0%{transform:scale(0.2);opacity:1;}
    70%{transform:scale(1.6);opacity:1;}
    100%{transform:scale(2);opacity:1;}
}

/* shake */
body.shake{
    animation: shake 0.6s ease;
}

@keyframes shake{
    0%{transform:translate(0,0);}
    20%{transform:translate(4px,-3px);}
    40%{transform:translate(-4px,3px);}
    60%{transform:translate(3px,2px);}
    80%{transform:translate(-3px,-2px);}
    100%{transform:translate(0,0);}
}

canvas{
    position:fixed;
    inset:0;
}

#bg{z-index:0;}
#particles{z-index:1;}

.top{
    position:fixed;
    top:0;
    width:100%;
    padding:12px;
    text-align:center;
    background:rgba(0,0,0,0.6);
    border-bottom:1px solid rgba(255,255,255,0.1);
    font-weight:900;
    letter-spacing:6px;
    text-shadow:0 0 6px rgba(255,255,255,0.4);
    z-index:999;
}

.container{
    position:relative;
    z-index:5;
    text-align:center;
    padding:110px 20px 80px;

    opacity:0;
    transform:scale(0.75);
    animation: fadeInExplosion 1.3s ease-out forwards;
}

@keyframes fadeInExplosion{
    0%{opacity:0;transform:scale(0.4);filter:blur(30px);}
    25%{opacity:1;transform:scale(1.1);filter:blur(0);}
    60%{transform:scale(0.98);}
    100%{transform:scale(1);}
}

h1{
    font-size:70px;
    text-shadow:0 0 10px rgba(255,255,255,0.4);
}

/* LESS GLOW */
.button{
    display:inline-block;
    margin:10px;
    padding:12px 25px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 0 20px rgba(255,255,255,0.15);
}

.beta{
    background:white;
    color:black;
}

.discord{
    background:#5865F2;
    color:white;
}

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.gallery img{
    width:300px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.dev{
    display:inline-block;
    margin:6px;
    padding:8px 12px;
    border-radius:10px;
    color:white;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="explosion"></div>

<canvas id="bg"></canvas>
<canvas id="particles"></canvas>

<div class="top">SHADOW STRIKE</div>

<div class="container">

<h1>SHADOW STRIKE</h1>
<p>Upcoming Roblox Game</p>

<a class="button beta">Get Beta</a>
<a class="button discord">Discord</a>

<h2>Screenshots</h2>
<div class="gallery">
    <img src="https://i.postimg.cc/pThpZDyZ/Znimok-ekrana-2026-07-04-o-22-15-00.png">
    <img src="https://i.postimg.cc/v84NrDh6/Znimok-ekrana-2026-07-04-o-22-27-09.png">
    <img src="https://i.postimg.cc/TYmNsSZ3/Znimok-ekrana-2026-07-04-o-22-27-39.png">
</div>

<h2>Developers</h2>
<div>
<a class="dev">kinglo0630</a>
<a class="dev">arsenalarmsrace</a>
<a class="dev">llcat_mokll</a>
</div>

</div>

<script>
const bg=document.getElementById("bg");
const btx=bg.getContext("2d");

function resize(){bg.width=innerWidth;bg.height=innerHeight;}
resize();
window.onresize=resize;

let offset=0;

function draw(){
btx.clearRect(0,0,bg.width,bg.height);
btx.fillStyle="#050505";
btx.fillRect(0,0,bg.width,bg.height);

offset+=0.4;

for(let i=-bg.width;i<bg.width;i+=45){
let x=i+(offset%45);
btx.strokeStyle="rgba(255,255,255,0.05)";
btx.beginPath();
btx.moveTo(x,0);
btx.lineTo(x+300,bg.height);
btx.stroke();
}

requestAnimationFrame(draw);
}
draw();

const pc=document.getElementById("particles");
const ctx=pc.getContext("2d");

function resizeP(){pc.width=innerWidth;pc.height=innerHeight;}
resizeP();
window.onresize=resizeP;

let mouse={x:0,y:0};
window.onmousemove=e=>{
mouse.x=e.clientX;
mouse.y=e.clientY;
};

let particles=[];
for(let i=0;i<120;i++){
particles.push({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
vx:(Math.random()-0.5),
vy:(Math.random()-0.5),
r:1.3
});
}

function animate(){
ctx.clearRect(0,0,pc.width,pc.height);

for(let p of particles){
let dx=p.x-mouse.x;
let dy=p.y-mouse.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<140){
p.x+=dx/dist*2.5;
p.y+=dy/dist*2.5;
}

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0)p.x=pc.width;
if(p.x>pc.width)p.x=0;
if(p.y<0)p.y=pc.height;
if(p.y>pc.height)p.y=0;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.shadowBlur=25;
ctx.shadowColor="white";
ctx.fillStyle="white";
ctx.fill();
ctx.shadowBlur=0;
}

requestAnimationFrame(animate);
}
animate();

setTimeout(()=>{
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),600);
},120);
</script>

</body>
</html>
