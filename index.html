<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Strike</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050505;
    color:white;
    overflow-x:hidden;
    overflow-y:auto;
}

/* CANVAS */
canvas{
    position:fixed;
    inset:0;
}

/* LAYERS */
#bg{ z-index:0; }
#particles{ z-index:1; }

/* UI */
.container{
    position:relative;
    z-index:5;
    text-align:center;
    padding:110px 20px 60px;
}

.top{
    position:fixed;
    top:0;
    width:100%;
    padding:12px;
    text-align:center;
    background:rgba(0,0,0,0.6);
    border-bottom:1px solid rgba(255,255,255,0.1);
    font-weight:900;
    letter-spacing:6px;
    z-index:999;
}

/* FADE IN (FIXED) */
.fade{
    opacity:0;
    transform:translateY(20px);
    animation:fadeIn 0.9s forwards;
}

.delay1{animation-delay:0.1s;}
.delay2{animation-delay:0.2s;}
.delay3{animation-delay:0.3s;}
.delay4{animation-delay:0.4s;}
.delay5{animation-delay:0.5s;}

@keyframes fadeIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* TEXT */
h1{
    font-size:70px;
    text-shadow:0 0 25px white;
}

/* BUTTONS */
.button{
    display:inline-block;
    margin:10px;
    padding:12px 25px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

.beta{
    background:white;
    color:black;
    box-shadow:0 0 20px white;
}

.discord{
    background:#5865F2;
    color:white;
    box-shadow:0 0 20px #5865F2;
}

/* SCREENSHOTS */
.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

.gallery img{
    width:300px;
    border-radius:18px;
    box-shadow:0 20px 40px rgba(0,0,0,0.7);
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* DEV LINKS */
.dev{
    display:inline-block;
    margin:6px;
    padding:8px 12px;
    border-radius:10px;
    color:white;
    text-decoration:none;
}

.dev:hover{
    background:rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<canvas id="particles"></canvas>

<div class="top">SHADOW STRIKE</div>

<script>
/* ================= STRIPES ================= */

const bg = document.getElementById("bg");
const btx = bg.getContext("2d");

function resizeBG(){
    bg.width = window.innerWidth;
    bg.height = window.innerHeight;
}
resizeBG();
window.addEventListener("resize", resizeBG);

let offset = 0;

function draw(){

    let w = bg.width;
    let h = bg.height;

    btx.clearRect(0,0,w,h);

    btx.fillStyle="#050505";
    btx.fillRect(0,0,w,h);

    offset += 0.4;

    for(let i=-w;i<w;i+=45){

        let x = i + (offset % 45);

        btx.strokeStyle="rgba(255,255,255,0.06)";
        btx.lineWidth=2;

        btx.beginPath();
        btx.moveTo(x,0);
        btx.lineTo(x+300,h);
        btx.stroke();
    }

    requestAnimationFrame(draw);
}
draw();


/* ================= PARTICLES (FIXED) ================= */

const pc = document.getElementById("particles");
const ctx = pc.getContext("2d");

function resizePC(){
    pc.width = window.innerWidth;
    pc.height = window.innerHeight;
}
resizePC();
window.addEventListener("resize", resizePC);

let mouse = {x:0,y:0};

window.addEventListener("mousemove", e=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

let particles = [];

for(let i=0;i<160;i++){
    particles.push({
        x:Math.random()*window.innerWidth,
        y:Math.random()*window.innerHeight,
        vx:(Math.random()-0.5)*0.6,
        vy:(Math.random()-0.5)*0.6,
        r:1
    });
}

function animate(){

    ctx.clearRect(0,0,pc.width,pc.height);

    for(let p of particles){

        let dx = p.x - mouse.x;
        let dy = p.y - mouse.y;
        let dist = Math.sqrt(dx*dx+dy*dy);

        if(dist < 140){
            p.x += dx/dist * 2.5;
            p.y += dy/dist * 2.5;
        }

        p.x += p.vx;
        p.y += p.vy;

        if(p.x<0)p.x=pc.width;
        if(p.x>pc.width)p.x=0;
        if(p.y<0)p.y=pc.height;
        if(p.y>pc.height)p.y=0;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

        ctx.fillStyle="rgba(255,255,255,0.7)";
        ctx.shadowBlur=12;
        ctx.shadowColor="white";
        ctx.fill();

        ctx.shadowBlur=0;
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
