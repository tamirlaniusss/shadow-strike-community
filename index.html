
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Strike</title>

<style>
html,body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#050505;
    color:white;
    overflow-y:auto;
    min-height:100vh;
}

/* BACKGROUND */
body{
    animation: breathe 6s ease-in-out infinite;
}

@keyframes breathe{
    0%{filter:brightness(1.05);}
    50%{filter:brightness(1.2);}
    100%{filter:brightness(1.05);}
}

/* CANVAS */
canvas{
    position:fixed;
    top:0;
    left:0;
}

#bg{z-index:0;}
#particles{z-index:1;}

/* TOP */
.top{
    position:fixed;
    top:0;
    width:100%;
    text-align:center;
    padding:12px;
    background:rgba(0,0,0,0.6);
    z-index:10;
    font-weight:bold;
    letter-spacing:5px;
}

/* MAIN */
.container{
    position:relative;
    z-index:5;
    text-align:center;
    padding-top:120px;
    padding-bottom:100px;
}

/* TITLE */
h1{
    font-size:60px;
    text-shadow:0 0 10px white;
}

/* BUTTONS */
.button{
    display:inline-block;
    padding:12px 20px;
    margin:10px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    cursor:pointer;
}

.beta{
    background:white;
    color:black;
}

.discord{
    background:#5865F2;
    color:white;
}

/* GALLERY */
.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

.gallery img{
    width:280px;
    border-radius:12px;
}

/* DEV */
.dev{
    display:inline-block;
    margin:5px;
    padding:6px 10px;
    background:rgba(255,255,255,0.1);
    border-radius:8px;
}
</style>
</head>

<body>

<div class="top">SHADOW STRIKE</div>

<canvas id="bg"></canvas>
<canvas id="particles"></canvas>

<div class="container">

<script>

/* STRIPES */
const bg=document.getElementById("bg");
const btx=bg.getContext("2d");

function resize(){
bg.width=innerWidth;
bg.height=innerHeight;
}
resize();
window.onresize=resize;

let offset=0;

function draw(){
btx.clearRect(0,0,bg.width,bg.height);
btx.fillStyle="#050505";
btx.fillRect(0,0,bg.width,bg.height);

offset+=0.4;

for(let i=-bg.width;i<bg.width;i+=50){
let x=i+(offset%50);

btx.strokeStyle="rgba(255,255,255,0.06)";
btx.beginPath();
btx.moveTo(x,0);
btx.lineTo(x+300,bg.height);
btx.stroke();
}

requestAnimationFrame(draw);
}
draw();

/* PARTICLES */
const pc=document.getElementById("particles");
const ctx=pc.getContext("2d");

function resizeP(){
pc.width=innerWidth;
pc.height=innerHeight;
}
resizeP();
window.onresize=resizeP;

let mouse={x:0,y:0};

window.onmousemove=e=>{
mouse.x=e.clientX;
mouse.y=e.clientY;
};

let particles=[];
for(let i=0;i<120;i++){
particles.push({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
vx:(Math.random()-0.5),
vy:(Math.random()-0.5),
r:1.5
});
}

function animate(){
ctx.clearRect(0,0,pc.width,pc.height);

for(let p of particles){
let dx=p.x-mouse.x;
let dy=p.y-mouse.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<140){
p.x+=dx/dist*2;
p.y+=dy/dist*2;
}

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0)p.x=pc.width;
if(p.x>pc.width)p.x=0;
if(p.y<0)p.y=pc.height;
if(p.y>pc.height)p.y=0;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();
}

requestAnimationFrame(animate);
}
animate();

</script>

</body>
