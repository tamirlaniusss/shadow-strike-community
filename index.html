<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Strike</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#050505;
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* ================= FADE IN ================= */

.fade{
    opacity:0;
    transform:translateY(20px);
    animation:fadeIn 0.9s ease forwards;
}

.delay1{animation-delay:0.1s;}
.delay2{animation-delay:0.2s;}
.delay3{animation-delay:0.3s;}
.delay4{animation-delay:0.4s;}
.delay5{animation-delay:0.5s;}

@keyframes fadeIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ================= TOP BANNER ================= */

.top-banner{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:12px 0;
    background:rgba(0,0,0,0.7);
    border-bottom:1px solid rgba(255,255,255,0.1);
    font-weight:900;
    letter-spacing:6px;
    z-index:999;

    opacity:0;
    animation:fadeIn 1s ease forwards;
}

/* ================= LAYOUT ================= */

.container{
    padding:120px 20px 60px;
    max-width:900px;
    margin:auto;
}

/* TITLE */

h1{
    font-size:70px;
    letter-spacing:6px;
    text-shadow:0 0 20px rgba(255,255,255,0.2);
}

.subtitle{
    color:#ccc;
    margin-top:10px;
}

/* BUTTONS */

a.button{
    display:inline-block;
    margin:20px 10px;
    padding:14px 30px;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.beta{
    background:white;
    color:black;
}

.discord{
    background:#5865F2;
    color:white;
}

a.button:hover{
    transform:scale(1.05);
}

/* SECTIONS */

h2{
    margin-top:60px;
}

/* DEVELOPERS */

.dev{
    display:inline-block;
    margin:8px;
    padding:8px 14px;
    border-radius:10px;
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.dev:hover{
    background:rgba(255,255,255,0.1);
    transform:scale(1.08);
}

/* GALLERY */

.gallery{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin-top:20px;
}

.gallery img{
    width:320px;
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
    box-shadow:0 30px 70px rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<div class="top-banner">
    SHADOW STRIKE
