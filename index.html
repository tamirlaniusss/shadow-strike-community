
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Strike</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050505;
    color:white;
    overflow:hidden;
}

/* 🌊 BREATHING GLOW */
body{
    animation: breathe 6s ease-in-out infinite;
}

@keyframes breathe{
    0%{ filter: contrast(1.1) brightness(1.05); }
    50%{ filter: contrast(1.6) brightness(1.6); }
    100%{ filter: contrast(1.1) brightness(1.05); }
}

/* 💥 EXPLOSION FADE IN */
.explosion{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9999;
}

.explosion::before{
    content:"";
    position:absolute;
    inset:0;
    background: radial-gradient(circle,
        rgba(255,255,255,0.35),
        rgba(0,0,0,0.95)
    );
    animation: flash 1.2s ease-out forwards;
}

.explosion::after{
    content:"";
    position:absolute;
    inset:0;
    border:2px solid rgba(255,255,255,0.5);
    border-radius:50%;
    transform:scale(0.2);
    opacity:1;
    animation: ring 1.2s ease-out forwards;
}

@keyframes flash{
    0%{ opacity:1; transform:scale(0.5); filter:blur(30px); }
    100%{ opacity:0; transform:scale(1.5); }
}

@keyframes ring{
    0%{ transform:scale(0.2); opacity:1; }
    100%{ transform:scale(2.5); opacity:0; }
}

/* 📳 SHAKE */
body.shake{
    animation: shake 0.6s ease;
}

@keyframes shake{
    0%{ transform:translate(0,0); }
    20%{ transform:translate(6px,-4px); }
    40%{ transform:translate(-6px,4px); }
    60%{ transform:translate(5px,3px); }
    80%{ transform:translate(-5px,-3px); }
    100%{ transform:translate(0,0); }
}

/* CANVAS */
canvas{
    position:fixed;
    inset:0;
}

#bg{ z-index:0; }
#particles{ z-index:1; }

/* TOP */
.top{
    position:fixed;
    top:0;
    width:100%;
    padding:12px;
    text-align:center;
    background:rgba(0,0,0,0.6);
    border-bottom:1px solid rgba(255,255,255,0.1);
    font-weight:900;
    letter-spacing:6px;
    text-shadow:0 0 20px white;
    z-index:999;
}

/* MAIN */
.container{
    position:relative;
    z-index:5;
    text-align:center;
    padding:110px 20px;

    opacity:0;
    transform:scale(0.6);
    animation: fadeIn 1.2s ease-out forwards;
}

@keyframes fadeIn{
    0%{
        opacity:0;
        transform:scale(0.4);
        filter:blur(40px);
    }
    40%{
        opacity:1;
        transform:scale(1.1);
        filter:blur(0);
    }
    100%{
        transform:scale(1);
    }
}

/* TITLE */
h1{
    font-size:70px;
    text-shadow:
    0 0 10px white,
    0 0 40px white,
    0 0 120px rgba(255,255,255,0.6);
}

/* BUTTONS */
.button{
    display:inline-block;
    margin:10px;
    padding:12px 25px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 0 60px rgba(255,255,255,0.3);
}

.beta{
    background:white;
    color:black;
    box-shadow:0 0 80px white;
}

.discord{
    background:#5865F2;
    color:white;
    box-shadow:0 0 80px #5865F2;
}

/* GALLERY */
.gallery{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
}

.gallery img{
    width:300px;
    border-radius:16px;
    box-shadow:0 20px 50px black, 0 0 120px rgba(255,255,255,0.2);
}

/* DEV */
.dev{
    display:inline-block;
    margin:6px;
    padding:8px 12px;
    border-radius:10px;
    color:white;
    text-decoration:none;
    text-shadow:0 0 10px white;
}
</style>
</head>

<body>

<div class="explosion"></div>

<canvas id="bg"></canvas>
<canvas id="particles"></canvas>

<div class="top">SHADOW STRIKE</div>

<div class="container">

<h1>SHADOW STRIKE</h1>
<p>Upcoming Roblox Game</p>

<a class="button beta">Get Beta</a>
<a class="button discord">Discord</a>

    <img src="https://i.postimg.cc/TYmNsSZ3/Znimok-ekrana-2026-07-04-o-22-27-39.png">
</div>

<script>

/* STRIPES */
const bg = document.getElementById("bg");
const btx = bg.getContext("2d");

function resize(){
    bg.width = innerWidth;
    bg.height = innerHeight;
}
resize();
window.onresize = resize;

let offset = 0;

function draw(){
    btx.clearRect(0,0,bg.width,bg.height);
    btx.fillStyle="#050505";
    btx.fillRect(0,0,bg.width,bg.height);

    offset += 0.4;

    for(let i=-bg.width;i<bg.width;i+=45){
        let x = i + (offset % 45);

        btx.strokeStyle="rgba(255,255,255,0.07)";
        btx.lineWidth=2;
        btx.beginPath();
        btx.moveTo(x,0);
        btx.lineTo(x+300,bg.height);
        btx.stroke();
    }

    requestAnimationFrame(draw);
}
draw();

/* PARTICLES */
const pc = document.getElementById("particles");
const ctx = pc.getContext("2d");

function resizeP(){
    pc.width = innerWidth;
    pc.height = innerHeight;
}
resizeP();
window.onresize = resizeP;

let mouse = {x:0,y:0};

window.onmousemove = e=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
};

let particles = [];

for(let i=0;i<200;i++){
    particles.push({
        x:Math.random()*innerWidth,
        y:Math.random()*innerHeight,
        vx:(Math.random()-0.5),
        vy:(Math.random()-0.5),
        r:1.5
    });
}

function animate(){
    ctx.clearRect(0,0,pc.width,pc.height);

    for(let p of particles){

        let dx = p.x - mouse.x;
        let dy = p.y - mouse.y;
        let dist = Math.sqrt(dx*dx+dy*dy);

        if(dist < 160){
            p.x += dx/dist * 3;
            p.y += dy/dist * 3;
        }

        p.x += p.vx;
        p.y += p.vy;

        if(p.x<0)p.x=pc.width;
        if(p.x>pc.width)p.x=0;
        if(p.y<0)p.y=pc.height;
        if(p.y>pc.height)p.y=0;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.shadowBlur = 60;
        ctx.shadowColor = "white";
        ctx.fillStyle = "white";
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    requestAnimationFrame(animate);
}
animate();

/* CAMERA SHAKE */
setTimeout(()=>{
    document.body.classList.add("shake");
    setTimeout(()=>document.body.classList.remove("shake"),600);
},120);

</script>

</body>
</html>
